name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"
      - name: Restore
        run: dotnet restore Rask.sln
      - name: Build
        run: dotnet build Rask.sln -c Release --no-restore

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"
      - name: Restore
        run: dotnet restore Rask.sln
      - name: Build
        run: dotnet build Rask.sln -c Release --no-restore
      - name: Server Tests
        run: dotnet test tests/Rask.Server.Tests/Rask.Server.Tests.csproj -c Release --no-build --logger "trx;LogFileName=server-results.trx"
      - name: Client Tests
        run: dotnet test tests/Rask.Client.Tests/Rask.Client.Tests.csproj -c Release --no-build --logger "trx;LogFileName=client-results.trx"
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: "**/TestResults/*.trx"
      - name: Test Report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: .NET Test Results
          path: "**/TestResults/*.trx"
          reporter: dotnet-trx

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Start RabbitMQ
        run: docker compose -f docker-compose.test.yml up -d --wait
      - name: Restore & Build
        run: dotnet build Rask.sln -c Release
      - name: Start Rask server
        env:
          RABBITMQ_HOST: localhost
          RABBITMQ_MANAGEMENT_PORT: "15672"
          RABBITMQ_AMQP_PORT: "5672"
          RABBITMQ_USER: guest
          RABBITMQ_PASSWORD: guest
          RABBITMQ_VHOST: /
        run: |
          dotnet run --project src/Rask.Server/Rask.Server.csproj -c Release --no-build &
          # Wait for server to be ready
          for i in $(seq 1 30); do
            curl -sf http://localhost:35672/ > /dev/null 2>&1 && break
            sleep 2
          done
      - name: Install Playwright
        working-directory: tests/Rask.E2E
        run: |
          npm ci
          npx playwright install --with-deps chromium
      - name: Run E2E tests
        working-directory: tests/Rask.E2E
        env:
          RASK_URL: http://localhost:35672
        run: npx playwright test
      - name: Upload E2E results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results
          path: |
            tests/Rask.E2E/test-results/
            tests/Rask.E2E/playwright-report/
      - name: E2E Test Report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: E2E Test Results
          path: test-results/e2e.xml
          reporter: java-junit

  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [unit-tests, e2e]
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set version
        id: ver
        env:
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          VERSION="2.0.${RUN_NUMBER}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "repo=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.blazor
          push: true
          tags: |
            ghcr.io/${{ steps.ver.outputs.repo }}:${{ steps.ver.outputs.version }}
            ghcr.io/${{ steps.ver.outputs.repo }}:latest
