name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"
      - name: Restore
        run: dotnet restore Rask.sln
      - name: Build
        run: dotnet build Rask.sln -c Release --no-restore
      - name: Unit Tests
        run: dotnet test tests/Rask.Server.Tests/Rask.Server.Tests.csproj -c Release --no-build --logger "trx;LogFileName=results.trx"
      - name: Client Tests
        run: dotnet test tests/Rask.Client.Tests/Rask.Client.Tests.csproj -c Release --no-build --logger "trx;LogFileName=results.trx"
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: "**/TestResults/*.trx"

  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [build]
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set version
        id: ver
        env:
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          VERSION="2.0.${RUN_NUMBER}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "repo=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.blazor
          push: true
          tags: |
            ghcr.io/${{ steps.ver.outputs.repo }}:${{ steps.ver.outputs.version }}
            ghcr.io/${{ steps.ver.outputs.repo }}:latest
