name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm build

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - name: Test report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Unit Tests
          path: test-results/unit.xml
          reporter: java-junit

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Start RabbitMQ
        run: docker compose -f docker-compose.test.yml up -d rabbitmq
      - run: pnpm exec playwright install --with-deps chromium
      - name: Wait for RabbitMQ to be healthy
        run: timeout 90 sh -c 'until curl -sf http://localhost:15672; do sleep 2; done'
      - run: pnpm test:e2e
        env:
          CI: "true"
          RABBITMQ_HOST: localhost
          RABBITMQ_MANAGEMENT_PORT: "15672"
          RABBITMQ_AMQP_PORT: "5672"
          RABBITMQ_USER: guest
          RABBITMQ_PASSWORD: guest
          RABBITMQ_VHOST: /
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.test.yml down

  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [unit-tests, e2e]
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Bump patch version
        id: ver
        env:
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          VERSION="1.1.${RUN_NUMBER}"
          npm version "$VERSION" --no-git-tag-version
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "repo=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ steps.ver.outputs.repo }}:${{ steps.ver.outputs.version }}
            ghcr.io/${{ steps.ver.outputs.repo }}:latest
