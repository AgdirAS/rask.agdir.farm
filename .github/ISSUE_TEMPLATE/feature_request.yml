name: Feature Request
description: Suggest a new feature or improvement for Rask
labels: ["feature"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please provide as much context as possible.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve? Why do you need it?
      placeholder: I'm frustrated when… / It would be helpful to…
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe your preferred solution or approach.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered other ways to solve this? What are the trade-offs?
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Feature Area
      options:
        - Queues
        - Exchanges
        - Bindings
        - Publish
        - Policies
        - Admin / Users
        - Overview / Charts
        - Multi-environment
        - Docker / Deployment
        - Other
    validations:
      required: false
